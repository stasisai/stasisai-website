name: Rebuild on WASM Update

on:
  repository_dispatch:
    types: [wasm-updated]
  workflow_dispatch:
    inputs:
      simulator_tag:
        description: "Simulator release tag (e.g. v0.1.0). Leave empty for latest."
        required: false

jobs:
  trigger-redeploy:
    name: Trigger Vercel Redeploy
    runs-on: ubuntu-latest

    steps:
      - name: Trigger production deploy
        run: |
          curl -X POST "${{ secrets.VERCEL_DEPLOY_HOOK }}"
          echo "Vercel deploy hook triggered — Vercel will download WASM during build."
