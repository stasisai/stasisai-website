name: Rebuild on WASM Update

on:
  repository_dispatch:
    types: [wasm-updated]
  workflow_dispatch:
    inputs:
      simulator_tag:
        description: "Simulator release tag (e.g. v0.1.0). Leave empty for latest."
        required: false

jobs:
  rebuild:
    name: Download WASM & Rebuild
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: "npm"

      - name: Determine release tag
        id: tag
        run: |
          # Priority: workflow input > dispatch payload > latest
          TAG="${{ github.event.inputs.simulator_tag }}"
          if [ -z "$TAG" ]; then
            TAG="${{ github.event.client_payload.tag }}"
          fi
          if [ -z "$TAG" ]; then
            TAG="latest"
          fi
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"

      - name: Download WASM artifacts
        env:
          GH_TOKEN: ${{ secrets.SIMULATOR_READ_TOKEN }}
        run: |
          TAG="${{ steps.tag.outputs.tag }}"
          if [ "$TAG" = "latest" ]; then
            gh release download --repo stasis-industry/mafis --pattern "mafis-wasm.tar.gz" --dir /tmp
          else
            gh release download "$TAG" --repo stasis-industry/mafis --pattern "mafis-wasm.tar.gz" --dir /tmp
          fi
          mkdir -p public/simulator
          tar -xzf /tmp/mafis-wasm.tar.gz -C public/simulator

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Install Playwright Browsers
        run: npx playwright install --with-deps chromium

      - name: Run Playwright tests
        run: npx playwright test

      - name: Deploy to Vercel
        run: npx vercel deploy --prebuilt --prod --token=${{ secrets.VERCEL_TOKEN }}
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
